name: resqmission
description: ResQMission - Emergency Response Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  flutter_contacts: ^1.1.9+2
  speech_to_text: ^7.0.0
  geolocator: ^13.0.0
  app_links: ^6.0.0
  permission_handler: ^11.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo.png
    - assets/onboarding_1.png
    - assets/onboarding_2.png
    - assets/onboarding_3.png
